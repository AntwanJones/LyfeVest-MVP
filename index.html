<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#00B4C8"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="LyfeVest"/>
  <title>LyfeVest</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body,#root{height:100%;overflow:hidden}
    body{font-family:'DM Sans',system-ui,sans-serif;background:#1A2B4A}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#D8E4F0;border-radius:2px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes pulse{0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(-4px);opacity:1}}
    .fu{animation:fadeUp .22s ease both}
    textarea,input{outline:none;font-family:inherit}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useCallback,useEffect}=React;

const T={teal:"#00B4C8",tealDk:"#0099AA",tealLt:"#E0F7FA",tealMid:"#B2EBF2",navy:"#1A2B4A",navyLt:"#2E4A72",sky:"#EBF4FF",white:"#FFFFFF",g100:"#F8FAFC",g200:"#F0F4F8",g300:"#D8E4F0",g400:"#9BAFC8",g500:"#6B7280",textSoft:"#4A6A8A",green:"#00C48C",greenLt:"#E8FFF6",blue:"#4A90D9",blueLt:"#EBF3FF",amber:"#F5A623",amberLt:"#FEF3DC",red:"#E05252",redLt:"#FFF0F0"};

const DOCS_INIT=[
  {id:1,name:"Medical Power of Attorney",cat:"legal",ico:"📋",bg:"#EBF3FF",status:"shared",updated:"Today"},
  {id:2,name:"Medication List — Current",cat:"medical",ico:"💊",bg:"#FFF0F0",status:"shared",updated:"Today"},
  {id:3,name:"Living Will / Advance Dir.",cat:"legal",ico:"⚖️",bg:"#EBF3FF",status:"private",updated:"Today"},
  {id:4,name:"Primary Insurance Card",cat:"insurance",ico:"🛡️",bg:"#E8FFF6",status:"pending",updated:"Needed"},
  {id:5,name:"Vaccination Records",cat:"medical",ico:"💉",bg:"#FFF0F0",status:"shared",updated:"Jan 2026"},
  {id:6,name:"Emergency Contact List",cat:"medical",ico:"📞",bg:"#FFF0F0",status:"private",updated:"Feb 2026"},
  {id:7,name:"Birth Certificate",cat:"identity",ico:"🪪",bg:"#FEF3DC",status:"private",updated:"Mar 2025"},
];
const CONTACTS=[
  {id:1,initials:"DJ",name:"Diane Jones",role:"Spouse · Guardian Access",color:T.navy,access:["write","emergency"],exp:"Dec 2026"},
  {id:2,initials:"MW",name:"Marcus Williams",role:"Brother · Emergency Only",color:T.teal,access:["read","emergency"],exp:"No expiry"},
  {id:3,initials:"PN",name:"Dr. Priya Nair",role:"Primary Physician · Advisor",color:T.green,access:["read"],exp:"Jun 2026"},
];
const ACTIVITY_INIT=[
  {type:"view",action:"Dr. Priya Nair viewed",detail:"Medication List — Current",time:"2 min ago"},
  {type:"share",action:"You shared",detail:"Medical POA with Diane Jones",time:"Today 9:41 AM"},
  {type:"edit",action:"You updated",detail:"Emergency Contact List",time:"Yesterday"},
  {type:"view",action:"Marcus Williams viewed",detail:"Emergency Contact List",time:"Feb 27"},
  {type:"share",action:"You shared",detail:"Vaccination Records with Dr. Nair",time:"Feb 25"},
];
const STEPS=["About You","Your Family","Priority Docs","Trusted Circle","Emergency Access","Review & Launch"];
const RELAY_SYS=`You are Relay, the warm AI setup guide for LyfeVest — a secure digital vault for families to store and share critical health and legal documents for emergencies.

Guide users through 6 steps conversationally like a trusted calm friend with healthcare expertise.

STEPS:
1. About You — first name and role
2. Your Family — who they are protecting
3. Priority Documents — top docs to add first
4. Trusted Circle — who gets emergency access
5. Emergency Access — read-only default, expiry, audit trail, QR access
6. Review & Launch — summarize and celebrate warmly

RULES: Max 3 sentences. ONE question per response. Use their name once you know it. Say "Step [N] complete ✓" when advancing. Start: introduce yourself as Relay in 1 sentence then ask their first name.`;

const chip=s=>({shared:{bg:"rgba(0,180,200,.12)",color:T.teal},private:{bg:T.g200,color:T.g500},pending:{bg:T.amberLt,color:T.amber}}[s]||{bg:T.g200,color:T.g500});
const aIco=t=>({view:"👁",share:"🔗",edit:"✏️"}[t]||"📌");
const aClr=t=>({view:T.teal,share:T.green,edit:T.blue}[t]||T.g400);

const Mark=({size=24,color="white"})=>(
  <svg width={size} height={size} viewBox="0 0 100 115" fill="none">
    <circle cx="50" cy="14" r="13" fill={color}/>
    <path d="M14 36 C12 33 12 29 15 27 C18 25 22 26 24 30 L48 91 C49 93 49.5 95 50 95 C50.5 95 51 93 52 91 L76 30 C78 26 82 25 85 27 C88 29 88 33 86 36 L58 98 C55 104 52 108 50 108 C48 108 45 104 42 98 Z" fill={color}/>
  </svg>
);

const Logo=({dark=false})=>(
  <div style={{display:"flex",alignItems:"center",gap:9}}>
    <div style={{width:34,height:34,background:dark?"rgba(0,180,200,.15)":T.teal,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",border:dark?"1px solid rgba(0,180,200,.3)":"none",flexShrink:0}}>
      <Mark size={22} color={dark?T.teal:"white"}/>
    </div>
    <span style={{fontFamily:"Nunito,sans-serif",fontSize:20,fontWeight:900,color:dark?"white":T.teal,letterSpacing:"-.3px"}}>LyfeVest</span>
  </div>
);

function Login({onLogin}){
  const[mode,setMode]=useState("main");
  const[em,setEm]=useState("");
  const[pw,setPw]=useState("");
  const[loading,setLoading]=useState(null);
  const go=p=>{setLoading(p);setTimeout(()=>{setLoading(null);onLogin({name:p==="email"?em.split("@")[0]||"Friend":"Antwan",email:em||"antwan@lyfevest.com"});},1400);};
  return(
    <div style={{minHeight:"100%",background:`linear-gradient(160deg,${T.navy} 0%,#1d3a5e 55%,#152e4d 100%)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"space-between",padding:"52px 24px 38px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-70,right:-70,width:220,height:220,background:"rgba(0,180,200,.08)",borderRadius:"50%"}}/>
      <div style={{position:"absolute",bottom:-55,left:-55,width:190,height:190,background:"rgba(0,180,200,.06)",borderRadius:"50%"}}/>
      <div style={{textAlign:"center",zIndex:1}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:20}}>
          <div style={{background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.11)",borderRadius:18,padding:"14px 22px"}}>
            <Logo dark/>
          </div>
        </div>
        <div style={{fontSize:23,fontFamily:"Nunito,sans-serif",fontWeight:800,color:"white",lineHeight:1.25,marginBottom:10}}>Be ready when<br/>it matters most.</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,.45)",lineHeight:1.65,maxWidth:262,margin:"0 auto"}}>A secure vault for your family's critical health and legal documents.</div>
      </div>
      <div style={{width:"100%",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.11)",borderRadius:22,padding:"22px 18px",zIndex:1}}>
        {mode==="main"?(
          <>
            <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,.35)",textAlign:"center",letterSpacing:".08em",textTransform:"uppercase",marginBottom:14}}>Sign in or create account</div>
            <button onClick={()=>go("google")} style={{width:"100%",padding:13,borderRadius:13,background:"white",border:"none",color:T.navy,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:9,opacity:loading==="google"?.65:1}}>
              {loading==="google"?"Signing in…":<><svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Continue with Google</>}
            </button>
            <button onClick={()=>go("apple")} style={{width:"100%",padding:13,borderRadius:13,background:"rgba(255,255,255,.11)",border:"1px solid rgba(255,255,255,.18)",color:"white",fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:13,opacity:loading==="apple"?.65:1}}>
              {loading==="apple"?"Signing in…":<><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>Continue with Apple</>}
            </button>
            <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:13}}>
              <div style={{flex:1,height:1,background:"rgba(255,255,255,.1)"}}/>
              <span style={{fontSize:11,color:"rgba(255,255,255,.25)"}}>or</span>
              <div style={{flex:1,height:1,background:"rgba(255,255,255,.1)"}}/>
            </div>
            <button onClick={()=>setMode("email")} style={{width:"100%",padding:13,borderRadius:13,background:"transparent",border:"1.5px solid rgba(255,255,255,.22)",color:"rgba(255,255,255,.72)",fontSize:14,fontWeight:600,cursor:"pointer"}}>✉️ Continue with Email</button>
          </>
        ):(
          <>
            <button onClick={()=>setMode("main")} style={{background:"none",border:"none",color:"rgba(255,255,255,.4)",fontSize:13,cursor:"pointer",marginBottom:12,display:"flex",alignItems:"center",gap:4,padding:0}}>← Back</button>
            <input value={em} onChange={e=>setEm(e.target.value)} placeholder="Email address" style={{width:"100%",padding:"12px 13px",borderRadius:11,border:"1.5px solid rgba(255,255,255,.16)",background:"rgba(255,255,255,.08)",color:"white",fontSize:14,marginBottom:9,boxSizing:"border-box"}}/>
            <input value={pw} onChange={e=>setPw(e.target.value)} type="password" placeholder="Password" style={{width:"100%",padding:"12px 13px",borderRadius:11,border:"1.5px solid rgba(255,255,255,.16)",background:"rgba(255,255,255,.08)",color:"white",fontSize:14,marginBottom:14,boxSizing:"border-box"}}/>
            <button onClick={()=>go("email")} style={{width:"100%",padding:13,borderRadius:13,background:T.teal,border:"none",color:"white",fontSize:14,fontWeight:700,cursor:"pointer"}}>{loading==="email"?"Signing in…":"Sign In →"}</button>
            <div style={{textAlign:"center",marginTop:11,fontSize:12,color:"rgba(255,255,255,.3)"}}>No account? <span onClick={()=>go("new")} style={{color:T.teal,cursor:"pointer",fontWeight:600}}>Create one free</span></div>
          </>
        )}
      </div>
      <div style={{fontSize:11,color:"rgba(255,255,255,.18)",textAlign:"center",zIndex:1}}>Bank-level encryption · HIPAA-aligned · No ads ever</div>
    </div>
  );
}

function App(){
  const[user,setUser]=useState(null);
  const[tab,setTab]=useState("home");
  const[docs,setDocs]=useState(DOCS_INIT);
  const[activity,setActivity]=useState(ACTIVITY_INIT);
  const[toast,setToast]=useState({show:false,msg:""});
  const[shareDoc,setShareDoc]=useState(null);
  const tRef=useRef(null);
  const showToast=useCallback((msg,dur=3000)=>{clearTimeout(tRef.current);setToast({show:true,msg});tRef.current=setTimeout(()=>setToast(p=>({...p,show:false})),dur);},[]);
  const doShare=(docId,cName)=>{setDocs(p=>p.map(d=>d.id===docId?{...d,status:"shared"}:d));setActivity(p=>[{type:"share",action:"You shared",detail:`${docs.find(d=>d.id===docId)?.name} with ${cName}`,time:"Just now"},...p]);setShareDoc(null);showToast(`✅ Shared with ${cName}`);};

  if(!user) return <div style={{height:"100vh",overflowY:"auto"}}><Login onLogin={setUser}/></div>;

  const NAV=[{id:"home",ico:"🏠",lbl:"Home"},{id:"guide",ico:null,lbl:"Relay"},{id:"vault",ico:"📂",lbl:"Vault"},{id:"circle",ico:"👥",lbl:"Circle"},{id:"activity",ico:"📋",lbl:"Activity"}];

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:T.sky,color:T.navy,overflow:"hidden",maxWidth:430,margin:"0 auto",fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      <div style={{background:T.white,borderBottom:`1px solid ${T.g300}`,padding:"0 16px",height:56,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,boxShadow:"0 1px 4px rgba(26,43,74,.06)"}}>
        <Logo/>
        <div style={{display:"flex",gap:8}}>
          <div onClick={()=>showToast("No new notifications")} style={{width:33,height:33,borderRadius:"50%",background:T.sky,border:`1px solid ${T.g300}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,cursor:"pointer"}}>🔔</div>
          <div onClick={()=>setUser(null)} title="Sign out" style={{width:33,height:33,borderRadius:"50%",background:T.navy,color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,border:`2px solid ${T.tealLt}`,cursor:"pointer"}}>{user.name.slice(0,2).toUpperCase()}</div>
        </div>
      </div>
      <div style={{flex:1,overflow:"hidden",position:"relative"}}>
        {tab==="home"&&<HomeScr docs={docs} onShare={id=>setShareDoc(docs.find(d=>d.id===id))} onNav={setTab} showToast={showToast} user={user}/>}
        {tab==="guide"&&<RelayScr showToast={showToast} onNav={setTab} user={user}/>}
        {tab==="vault"&&<VaultScr docs={docs} onShare={id=>setShareDoc(docs.find(d=>d.id===id))} showToast={showToast}/>}
        {tab==="circle"&&<CircleScr activity={activity} showToast={showToast}/>}
        {tab==="activity"&&<ActivityScr activity={activity}/>}
      </div>
      <div style={{background:T.white,borderTop:`1px solid ${T.g300}`,display:"flex",flexShrink:0,boxShadow:"0 -3px 12px rgba(26,43,74,.07)"}}>
        {NAV.map(it=>(
          <button key={it.id} onClick={()=>setTab(it.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,padding:"8px 4px 7px",border:"none",background:"none",cursor:"pointer"}}>
            <div style={{width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,transform:tab===it.id?"scale(1.12)":"scale(1)",transition:"transform .15s"}}>
              {it.ico?it.ico:<Mark size={22} color={tab===it.id?T.teal:T.g400}/>}
            </div>
            <div style={{fontSize:10,fontWeight:600,color:tab===it.id?T.teal:T.g400,letterSpacing:".02em"}}>{it.lbl}</div>
          </button>
        ))}
      </div>
      {shareDoc&&<ShareSheet doc={shareDoc} onClose={()=>setShareDoc(null)} onShare={doShare}/>}
      <div style={{position:"fixed",bottom:72,left:"50%",transform:`translateX(-50%) translateY(${toast.show?0:14}px)`,opacity:toast.show?1:0,transition:"all .25s",background:T.navy,color:"white",borderRadius:11,padding:"11px 16px",display:"flex",alignItems:"center",gap:8,zIndex:999,pointerEvents:"none",whiteSpace:"nowrap",boxShadow:"0 12px 36px rgba(26,43,74,.22)"}}>
        <span style={{color:T.green}}>✅</span><span style={{fontSize:13,fontWeight:500}}>{toast.msg}</span>
      </div>
    </div>
  );
}

function HomeScr({docs,onShare,onNav,showToast,user}){
  const shared=docs.filter(d=>d.status==="shared").length,pending=docs.filter(d=>d.status==="pending").length;
  return(
    <div style={{height:"100%",overflowY:"auto",background:T.sky,paddingBottom:16}}>
      <div style={{background:`linear-gradient(145deg,${T.navy},${T.navyLt})`,padding:"20px 18px 24px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",right:-25,bottom:-25,width:130,height:130,background:"rgba(0,180,200,.15)",borderRadius:"50%"}}/>
        <div style={{fontSize:12,color:"rgba(255,255,255,.48)",marginBottom:2}}>Good morning,</div>
        <div style={{fontFamily:"Nunito,sans-serif",fontSize:21,fontWeight:800,color:"white",marginBottom:16}}>{user.name} <span style={{color:T.tealMid}}>👋</span></div>
        <div style={{background:"rgba(255,255,255,.09)",border:"1px solid rgba(255,255,255,.12)",borderRadius:18,padding:"13px 15px",display:"flex",alignItems:"center",gap:11,position:"relative",zIndex:1}}>
          <div style={{width:40,height:40,background:T.teal,borderRadius:11,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Mark size={24} color="white"/></div>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:"white",marginBottom:1}}>Your Vault is Active</div><div style={{fontSize:11,color:"rgba(255,255,255,.45)"}}>{shared} shared · {CONTACTS.length} contacts · {pending} pending</div></div>
          <button onClick={()=>onNav("vault")} style={{background:T.teal,color:"white",border:"none",borderRadius:100,padding:"7px 13px",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>Open Vault</button>
        </div>
      </div>
      <div style={{padding:"16px 16px 0"}}>
        <SH title="Vault Overview" link="See all" onLink={()=>onNav("vault")}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:16}}>
          {[{n:docs.length,l:"Documents\nStored",c:T.teal,b:T.teal,fn:()=>onNav("vault")},{n:CONTACTS.length,l:"Trusted\nContacts",c:T.green,b:T.green,fn:()=>onNav("circle")},{n:pending,l:"Docs\nPending",c:T.amber,b:T.amber,fn:()=>onNav("vault")},{n:"100%",l:"Encrypted\n& Secure",c:T.blue,b:T.blue,fn:()=>onNav("activity")}].map((s,i)=>(
            <div key={i} onClick={s.fn} style={{background:T.white,borderRadius:14,padding:"13px 14px",border:`1px solid ${T.g300}`,borderTop:`3px solid ${s.b}`,cursor:"pointer",boxShadow:"0 1px 4px rgba(26,43,74,.05)"}}>
              <div style={{fontFamily:"Nunito,sans-serif",fontSize:24,fontWeight:900,color:s.c,lineHeight:1,marginBottom:3}}>{s.n}</div>
              <div style={{fontSize:11,color:T.g500,lineHeight:1.35,whiteSpace:"pre-line"}}>{s.l}</div>
            </div>
          ))}
        </div>
        <SH title="Quick Actions"/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:16}}>
          {[{ico:"📤",lbl:"Upload",bg:T.tealLt,fn:()=>onNav("vault")},{ico:"👥",lbl:"Add Contact",bg:T.greenLt,fn:()=>onNav("circle")},{ico:"🔗",lbl:"Share",bg:T.amberLt,fn:()=>onShare(1)},{ico:null,lbl:"Relay AI",bg:T.blueLt,fn:()=>onNav("guide")}].map((q,i)=>(
            <div key={i} onClick={q.fn} style={{background:T.white,borderRadius:14,padding:"11px 5px",display:"flex",flexDirection:"column",alignItems:"center",gap:5,border:`1px solid ${T.g300}`,cursor:"pointer"}}>
              <div style={{width:34,height:34,background:q.bg,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>{q.ico?q.ico:<Mark size={19} color={T.blue}/>}</div>
              <div style={{fontSize:9,fontWeight:600,color:T.textSoft,textAlign:"center",lineHeight:1.3}}>{q.lbl}</div>
            </div>
          ))}
        </div>
        <SH title="Recent Documents" link="See all" onLink={()=>onNav("vault")}/>
        <div style={{display:"flex",flexDirection:"column",gap:8,paddingBottom:16}}>
          {docs.slice(0,4).map((d,i)=><DocRow key={d.id} doc={d} onClick={()=>onShare(d.id)} delay={i*45}/>)}
        </div>
      </div>
    </div>
  );
}

function RelayScr({showToast,onNav,user}){
  const[msgs,setMsgs]=useState([]);
  const[qr,setQr]=useState([]);
  const[busy,setBusy]=useState(false);
  const[step,setStep]=useState(1);
  const[input,setInput]=useState("");
  const hist=useRef([]),body=useRef(null),started=useRef(false);
  const pct=Math.round(((step-1)/6)*100);
  const scroll=()=>setTimeout(()=>body.current&&(body.current.scrollTop=99999),60);
  const addMsg=(role,text)=>{setMsgs(p=>[...p,{role,text,id:Date.now()+Math.random()}]);scroll();};
  const callAPI=useCallback(async(silent=false)=>{
    setBusy(true);setQr([]);
    const messages=silent?[{role:"user",content:"Begin. Introduce yourself as Relay in one sentence, then ask the user's first name."}]:hist.current;
    try{
      const r=await fetch("/.netlify/functions/relay",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:350,system:RELAY_SYS,messages})});
      if(!r.ok)throw new Error(`${r.status}`);
      const d=await r.json();
      const txt=d.content?.[0]?.text||"One moment…";
      hist.current.push({role:"assistant",content:txt});addMsg("ai",txt);
      const sm=txt.match(/Step (\d) complete/i);if(sm)setStep(s=>Math.min(parseInt(sm[1])+1,6));
      const lo=txt.toLowerCase();
      if(lo.includes("first name")||lo.includes("your name"))setQr(["Antwan","Type my name"]);
      else if(lo.includes("role")||lo.includes("caregiver"))setQr(["Caring for aging parent","Parent of young children","Both","Planning ahead"]);
      else if(lo.includes("family")||lo.includes("protecting"))setQr(["Aging parent","Young children","Spouse","All of the above"]);
      else if(lo.includes("document")||lo.includes("priority"))setQr(["Medical POA","Insurance card","Medication list","All of the above"]);
      else if(lo.includes("trust")||lo.includes("circle")||lo.includes("who should"))setQr(["Spouse/Partner","Adult sibling","My doctor","Multiple people"]);
      else if(lo.includes("access")||lo.includes("qr"))setQr(["Yes, enable QR","Read-only is fine","No expiry"]);
      else if(lo.includes("all set")||lo.includes("vault is ready")){setStep(6);setQr(["📂 Open My Vault","👥 View My Circle"]);showToast("🎉 Setup complete!");}
    }catch(e){addMsg("ai","**Connection issue.** Please check that your ANTHROPIC_API_KEY is set in Netlify → Project configuration → Environment variables, then redeploy.");setQr(["Try again"]);}
    finally{setBusy(false);}
  },[showToast]);
  useEffect(()=>{if(!started.current){started.current=true;callAPI(true);}},[callAPI]);
  const send=txt=>{if(!txt.trim()||busy)return;addMsg("user",txt);hist.current.push({role:"user",content:txt});setInput("");callAPI();};
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:T.white}}>

        <div style={{height:5,background:T.g300,borderRadius:3,marginBottom:9}}><div style={{height:"100%",background:T.teal,borderRadius:3,width:`${pct}%`,transition:"width .5s ease"}}/></div>
        <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:10,scrollbarWidth:"none"}}>
          {STEPS.map((nm,i)=>{const n=i+1,done=n<step,active=n===step;return(
            <div key={n} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",borderRadius:100,fontSize:11,fontWeight:600,whiteSpace:"nowrap",flexShrink:0,background:active?T.navy:done?T.tealLt:T.g100,color:active?"white":done?T.teal:T.g400,border:`1px solid ${active?T.navy:done?T.tealMid:T.g300}`}}>
              <div style={{width:14,height:14,borderRadius:"50%",background:active||done?T.teal:"rgba(0,0,0,.08)",color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:800}}>{done?"✓":n}</div>{nm}
            </div>);})}

        {busy&&<div style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:T.teal,fontWeight:600}}>{[0,.18,.36].map((d,i)=><span key={i} style={{width:4,height:4,background:T.teal,borderRadius:"50%",display:"inline-block",animation:`pulse 1.1s ease ${d}s infinite`}}/>)}<span style={{marginLeft:2}}>Thinking</span></div>}

function SH({title,link,onLink}){return(<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:11}}><div style={{fontFamily:"Nunito,sans-serif",fontSize:14,fontWeight:800,color:T.navy}}>{title}</div>{link&&<div onClick={onLink} style={{fontSize:12,fontWeight:600,color:T.teal,cursor:"pointer"}}>{link}</div>}</div>);}
function DocRow({doc,onClick,delay=0}){const c=chip(doc.status);return(<div className="fu" onClick={onClick} style={{background:T.white,borderRadius:14,padding:"12px 14px",display:"flex",alignItems:"center",gap:10,border:`1px solid ${T.g300}`,cursor:"pointer",animationDelay:`${delay}ms`}}><div style={{width:36,height:36,borderRadius:10,background:doc.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{doc.ico}</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,color:T.navy,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{doc.name}</div><div style={{fontSize:11,color:T.g400,marginTop:1}}>{doc.cat[0].toUpperCase()+doc.cat.slice(1)} · {doc.updated}</div></div><Chip s={doc.status}/></div>);}
function Chip({s}){const c=chip(s);return <span style={{fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:100,background:c.bg,color:c.color,letterSpacing:".03em",flexShrink:0}}>{s.toUpperCase()}</span>;}
function Bdg({l,bg,c}){return <span style={{fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:100,background:bg,color:c,letterSpacing:".03em"}} dangerouslySetInnerHTML={{__html:l}}/>;}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
