<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#00B4C8"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="LyfeVest"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>LyfeVest</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body,#root{height:100%;overflow:hidden}
    body{font-family:'DM Sans',system-ui,sans-serif;background:#1A2B4A}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#D8E4F0;border-radius:2px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes pulse{0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(-4px);opacity:1}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .fu{animation:fadeUp .22s ease both}
    textarea,input{outline:none;font-family:inherit}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useCallback,useEffect,useMemo}=React;

// ── SUPABASE CLIENT ──────────────────────────────────────────────────────────
const SUPA_URL = window.ENV_SUPABASE_URL || '';
const SUPA_KEY = window.ENV_SUPABASE_ANON_KEY || '';
let supabase = null;
try {
  if (SUPA_URL && SUPA_KEY) {
    supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  }
} catch(e) { console.warn('Supabase init failed:', e); }

// ── THEME ────────────────────────────────────────────────────────────────────
const T={teal:"#00B4C8",tealDk:"#0099AA",tealLt:"#E0F7FA",tealMid:"#B2EBF2",navy:"#1A2B4A",navyLt:"#2E4A72",sky:"#EBF4FF",white:"#FFFFFF",g100:"#F8FAFC",g200:"#F0F4F8",g300:"#D8E4F0",g400:"#9BAFC8",g500:"#6B7280",textSoft:"#4A6A8A",green:"#00C48C",greenLt:"#E8FFF6",blue:"#4A90D9",blueLt:"#EBF3FF",amber:"#F5A623",amberLt:"#FEF3DC",red:"#E05252",redLt:"#FFF0F0"};

// ── CONSTANTS ────────────────────────────────────────────────────────────────
const STEPS=["About You","Your Family","Priority Docs","Trusted Circle","Emergency Access","Review & Launch"];
const RELAY_SYS=`You are Relay, the warm AI setup guide for LyfeVest — a secure digital vault for families to store and share critical health and legal documents for emergencies.

Guide users through 6 steps conversationally like a trusted calm friend with healthcare expertise.

STEPS:
1. About You — first name and role (caregiver, parent, planning ahead)
2. Your Family — who they are protecting
3. Priority Documents — top docs to add first
4. Trusted Circle — who gets emergency access
5. Emergency Access — read-only default, expiry, audit trail
6. Review & Launch — summarize and celebrate warmly, tell them their vault is ready

RULES: Max 3 sentences per response. ONE question per response. Use their name once you know it. Say "Step [N] complete ✓" when advancing. Start: introduce yourself as Relay in 1 sentence then ask their first name.`;

const DOC_CATS=[
  {id:"all",l:"📁 All"},
  {id:"medical",l:"🏥 Medical"},
  {id:"legal",l:"⚖️ Legal"},
  {id:"insurance",l:"🛡️ Insurance"},
  {id:"identity",l:"🪪 Identity"}
];

// ── HELPERS ──────────────────────────────────────────────────────────────────
const chip=s=>({shared:{bg:"rgba(0,180,200,.12)",color:T.teal},private:{bg:T.g200,color:T.g500},pending:{bg:T.amberLt,color:T.amber}}[s]||{bg:T.g200,color:T.g500});
const aIco=t=>({view:"👁",share:"🔗",edit:"✏️"}[t]||"📌");
const aClr=t=>({view:T.teal,share:T.green,edit:T.blue}[t]||T.g400);
const fmtTime=ts=>{if(!ts)return"";const d=new Date(ts),now=new Date(),diff=now-d;if(diff<60000)return"Just now";if(diff<3600000)return`${Math.floor(diff/60000)}m ago`;if(diff<86400000)return`Today ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;return d.toLocaleDateString([],{month:'short',day:'numeric'});};

// ── LOGO / MARK ──────────────────────────────────────────────────────────────
const Mark=({size=24,color="white"})=>(
  <svg width={size} height={size} viewBox="0 0 100 115" fill="none">
    <circle cx="50" cy="14" r="13" fill={color}/>
    <path d="M14 36 C12 33 12 29 15 27 C18 25 22 26 24 30 L48 91 C49 93 49.5 95 50 95 C50.5 95 51 93 52 91 L76 30 C78 26 82 25 85 27 C88 29 88 33 86 36 L58 98 C55 104 52 108 50 108 C48 108 45 104 42 98 Z" fill={color}/>
  </svg>
);
const Logo=({dark=false})=>(
  <div style={{display:"flex",alignItems:"center",gap:9}}>
    <div style={{width:34,height:34,background:dark?"rgba(0,180,200,.15)":T.teal,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",border:dark?"1px solid rgba(0,180,200,.3)":"none",flexShrink:0}}>
      <Mark size={22} color={dark?T.teal:"white"}/>
    </div>
    <span style={{fontFamily:"Nunito,sans-serif",fontSize:20,fontWeight:900,color:dark?"white":T.teal,letterSpacing:"-.3px"}}>LyfeVest</span>
  </div>
);

// ── SMALL COMPONENTS ─────────────────────────────────────────────────────────
const SH=({title,link,onLink})=>(
  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:11}}>
    <div style={{fontFamily:"Nunito,sans-serif",fontSize:14,fontWeight:800,color:T.navy}}>{title}</div>
    {link&&<div onClick={onLink} style={{fontSize:12,fontWeight:600,color:T.teal,cursor:"pointer"}}>{link}</div>}
  </div>
);
const Chip=({s})=>{const c=chip(s);return <span style={{fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:100,background:c.bg,color:c.color,letterSpacing:".03em",flexShrink:0}}>{s.toUpperCase()}</span>;};
const Bdg=({l,bg,c})=><span style={{fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:100,background:bg,color:c,letterSpacing:".03em"}} dangerouslySetInnerHTML={{__html:l}}/>;
const Spinner=()=><div style={{width:18,height:18,border:`2px solid rgba(255,255,255,.3)`,borderTop:`2px solid white`,borderRadius:"50%",animation:"spin .7s linear infinite",display:"inline-block"}}/>;

// ── LOGIN ────────────────────────────────────────────────────────────────────
function Login({onLogin}){
  const[mode,setMode]=useState("main");
  const[em,setEm]=useState("");
  const[pw,setPw]=useState("");
  const[loading,setLoading]=useState(null);
  const[err,setErr]=useState("");
  const[isNew,setIsNew]=useState(false);

  const handleEmail=async(signUp=false)=>{
    if(!em||!pw){setErr("Please enter email and password.");return;}
    setErr("");setLoading("email");
    if(!supabase){
      // Demo fallback
      setTimeout(()=>{setLoading(null);onLogin({id:"demo",email:em,name:em.split("@")[0]||"Friend",isNew:true});},1200);
      return;
    }
    try{
      let res;
      if(signUp){
        res=await supabase.auth.signUp({email:em,password:pw});
      } else {
        res=await supabase.auth.signInWithPassword({email:em,password:pw});
      }
      if(res.error){setErr(res.error.message);setLoading(null);return;}
      const u=res.data.user;
      // Check if profile exists
      const{data:profile}=await supabase.from("profiles").select("*").eq("email",u.email).single();
      onLogin({id:u.id,email:u.email,name:profile?.preferred_name||u.email.split("@")[0],isNew:!profile||signUp});
    }catch(e){setErr(e.message);} finally{setLoading(null);}
  };

  const handleOAuth=async(provider)=>{
    if(!supabase){setErr("OAuth requires Supabase connection.");return;}
    setLoading(provider);
    await supabase.auth.signInWithOAuth({provider,options:{redirectTo:window.location.origin}});
  };

  return(
    <div style={{minHeight:"100%",background:`linear-gradient(160deg,${T.navy} 0%,#1d3a5e 55%,#152e4d 100%)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"space-between",padding:"52px 24px 38px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-70,right:-70,width:220,height:220,background:"rgba(0,180,200,.08)",borderRadius:"50%"}}/>
      <div style={{position:"absolute",bottom:-55,left:-55,width:190,height:190,background:"rgba(0,180,200,.06)",borderRadius:"50%"}}/>
      <div style={{textAlign:"center",zIndex:1}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:20}}>
          <div style={{background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.11)",borderRadius:18,padding:"14px 22px"}}>
            <Logo dark/>
          </div>
        </div>
        <div style={{fontSize:23,fontFamily:"Nunito,sans-serif",fontWeight:800,color:"white",lineHeight:1.25,marginBottom:10}}>Be ready when<br/>it matters most.</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,.45)",lineHeight:1.65,maxWidth:262,margin:"0 auto"}}>A secure vault for your family's critical health and legal documents.</div>
      </div>
      <div style={{width:"100%",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.11)",borderRadius:22,padding:"22px 18px",zIndex:1}}>
        {mode==="main"?(
          <>
            <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,.35)",textAlign:"center",letterSpacing:".08em",textTransform:"uppercase",marginBottom:14}}>Sign in or create account</div>
            <button onClick={()=>handleOAuth("google")} style={{width:"100%",padding:13,borderRadius:13,background:"white",border:"none",color:T.navy,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:9,opacity:loading==="google"?.65:1}}>
              {loading==="google"?<Spinner/>:<><svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Continue with Google</>}
            </button>
            <button onClick={()=>handleOAuth("apple")} style={{width:"100%",padding:13,borderRadius:13,background:"rgba(255,255,255,.11)",border:"1px solid rgba(255,255,255,.18)",color:"white",fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:13,opacity:loading==="apple"?.65:1}}>
              {loading==="apple"?<Spinner/>:<><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>Continue with Apple</>}
            </button>
            <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:13}}>
              <div style={{flex:1,height:1,background:"rgba(255,255,255,.1)"}}/>
              <span style={{fontSize:11,color:"rgba(255,255,255,.25)"}}>or</span>
              <div style={{flex:1,height:1,background:"rgba(255,255,255,.1)"}}/>
            </div>
            <button onClick={()=>setMode("email")} style={{width:"100%",padding:13,borderRadius:13,background:"transparent",border:"1.5px solid rgba(255,255,255,.22)",color:"rgba(255,255,255,.72)",fontSize:14,fontWeight:600,cursor:"pointer"}}>✉️ Continue with Email</button>
          </>
        ):(
          <>
            <button onClick={()=>{setMode("main");setErr("");}} style={{background:"none",border:"none",color:"rgba(255,255,255,.4)",fontSize:13,cursor:"pointer",marginBottom:12,display:"flex",alignItems:"center",gap:4,padding:0}}>← Back</button>
            <div style={{fontSize:13,fontWeight:700,color:"rgba(255,255,255,.6)",marginBottom:12,textAlign:"center"}}>{isNew?"Create your account":"Sign in to your vault"}</div>
            <input value={em} onChange={e=>setEm(e.target.value)} placeholder="Email address" type="email" style={{width:"100%",padding:"12px 13px",borderRadius:11,border:`1.5px solid ${err?"rgba(224,82,82,.5)":"rgba(255,255,255,.16)"}`,background:"rgba(255,255,255,.08)",color:"white",fontSize:14,marginBottom:9,boxSizing:"border-box"}}/>
            <input value={pw} onChange={e=>setPw(e.target.value)} type="password" placeholder="Password (min 6 chars)" style={{width:"100%",padding:"12px 13px",borderRadius:11,border:`1.5px solid ${err?"rgba(224,82,82,.5)":"rgba(255,255,255,.16)"}`,background:"rgba(255,255,255,.08)",color:"white",fontSize:14,marginBottom:err?6:14,boxSizing:"border-box"}}/>
            {err&&<div style={{fontSize:12,color:"#ff9999",marginBottom:10,textAlign:"center"}}>{err}</div>}
            {isNew?(
              <button onClick={()=>handleEmail(true)} style={{width:"100%",padding:13,borderRadius:13,background:T.teal,border:"none",color:"white",fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                {loading==="email"?<><Spinner/> Creating account…</>:"Create Account →"}
              </button>
            ):(
              <button onClick={()=>handleEmail(false)} style={{width:"100%",padding:13,borderRadius:13,background:T.teal,border:"none",color:"white",fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                {loading==="email"?<><Spinner/> Signing in…</>:"Sign In →"}
              </button>
            )}
            <div style={{textAlign:"center",marginTop:11,fontSize:12,color:"rgba(255,255,255,.3)"}}>
              {isNew?"Already have an account? ":"New to LyfeVest? "}
              <span onClick={()=>{setIsNew(!isNew);setErr("");}} style={{color:T.teal,cursor:"pointer",fontWeight:600}}>{isNew?"Sign in":"Create one free"}</span>
            </div>
          </>
        )}
      </div>
      <div style={{fontSize:11,color:"rgba(255,255,255,.18)",textAlign:"center",zIndex:1}}>Bank-level encryption · HIPAA-aligned · No ads ever</div>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);
  const[tab,setTab]=useState("guide");
  const[docs,setDocs]=useState([]);
  const[contacts,setContacts]=useState([]);
  const[activity,setActivity]=useState([]);
  const[toast,setToast]=useState({show:false,msg:""});
  const[shareDoc,setShareDoc]=useState(null);
  const[uploadModal,setUploadModal]=useState(false);
  const[addContactModal,setAddContactModal]=useState(false);
  const[loading,setLoading]=useState(false);
  const tRef=useRef(null);

  // Check for existing session on mount
  useEffect(()=>{
    if(!supabase)return;
    supabase.auth.getSession().then(({data:{session}})=>{
      if(session?.user){
        const u=session.user;
        supabase.from("profiles").select("*").eq("email",u.email).single().then(({data:profile})=>{
          setUser({id:u.id,email:u.email,name:profile?.preferred_name||u.email.split("@")[0],isNew:!profile});
          if(profile)setTab("home");
        });
      }
    });
    const{data:{subscription}}=supabase.auth.onAuthStateChange((_,session)=>{
      if(!session)setUser(null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  // Load user data when logged in
  useEffect(()=>{
    if(!user||!supabase)return;
    loadDocs();loadContacts();loadActivity();
  },[user]);

  const loadDocs=async()=>{
    if(!supabase||!user)return;
    const{data}=await supabase.from("documents").select("*").eq("owner_email",user.email).order("created_at",{ascending:false});
    if(data)setDocs(data.map(d=>({
      id:d.id,name:d.document_name,cat:d.type?.toLowerCase()||"other",
      ico:catIco(d.type),bg:catBg(d.type),
      status:d.shared_access?"shared":"private",
      updated:fmtTime(d.created_at),
      url:d.file_url,sensitive:d.sensitive
    })));
  };

  const loadContacts=async()=>{
    if(!supabase||!user)return;
    const{data}=await supabase.from("trusted_contacts").select("*").eq("owner_email",user.email).order("created_at",{ascending:false});
    if(data)setContacts(data.map(c=>({
      id:c.id,name:c.contact_name,email:c.contact_email,
      role:`${c.relationship_type||"Contact"} · ${c.access_level||"Read"} Access`,
      initials:(c.contact_name||"??").split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase(),
      color:[T.navy,T.teal,T.green,T.blue][Math.abs(c.contact_name?.charCodeAt(0)||0)%4],
      access:[c.access_level?.toLowerCase()||"read"],
      exp:c.expiration_date?new Date(c.expiration_date).toLocaleDateString([],{month:"short",year:"numeric"}):"No expiry"
    })));
  };

  const loadActivity=async()=>{
    if(!supabase||!user)return;
    const{data}=await supabase.from("activity_log").select("*").eq("user_email",user.email).order("timestamp",{ascending:false}).limit(20);
    if(data)setActivity(data.map(a=>({
      type:a.action?.includes("view")?"view":a.action?.includes("share")?"share":"edit",
      action:a.action,detail:a.target_table,time:fmtTime(a.timestamp)
    })));
  };

  const logActivity=async(action,target)=>{
    if(!supabase||!user)return;
    await supabase.from("activity_log").insert({user_email:user.email,action,target_table:target,timestamp:new Date().toISOString()});
    loadActivity();
  };

  const showToast=useCallback((msg,dur=3000)=>{
    clearTimeout(tRef.current);
    setToast({show:true,msg});
    tRef.current=setTimeout(()=>setToast(p=>({...p,show:false})),dur);
  },[]);

  const handleUpload=async(file,meta)=>{
    if(!supabase||!user){showToast("⚠️ Connect Supabase to enable uploads");return;}
    setLoading(true);
    try{
      const ext=file.name.split(".").pop();
      const path=`${user.id}/${Date.now()}.${ext}`;
      const{error:upErr}=await supabase.storage.from("documents").upload(path,file);
      if(upErr)throw upErr;
      const{data:{publicUrl}}=supabase.storage.from("documents").getPublicUrl(path);
      await supabase.from("documents").insert({
        owner_email:user.email,document_name:meta.name,type:meta.type,
        sensitive:meta.sensitive,file_url:publicUrl,shared_access:false,
        upload_date:new Date().toISOString()
      });
      await logActivity(`You uploaded ${meta.name}`,"documents");
      loadDocs();
      showToast("✅ Document uploaded securely");
      setUploadModal(false);
    }catch(e){showToast(`❌ Upload failed: ${e.message}`);}
    finally{setLoading(false);}
  };

  const handleAddContact=async(contact)=>{
    if(!supabase||!user){showToast("⚠️ Connect Supabase to add contacts");return;}
    setLoading(true);
    try{
      await supabase.from("trusted_contacts").insert({
        owner_email:user.email,contact_name:contact.name,contact_email:contact.email,
        relationship_type:contact.relationship,access_level:contact.access,
        active:true,added_date:new Date().toISOString()
      });
      await logActivity(`You added ${contact.name} to your circle`,"trusted_contacts");
      loadContacts();
      showToast(`✅ ${contact.name} added to your circle`);
      setAddContactModal(false);
    }catch(e){showToast(`❌ Error: ${e.message}`);}
    finally{setLoading(false);}
  };

  const doShare=async(docId,contactName,contactEmail)=>{
    const doc=docs.find(d=>d.id===docId);
    if(!doc)return;
    if(supabase&&user){
      await supabase.from("documents").update({shared_access:true}).eq("id",docId);
      await supabase.from("document_access").insert({
        owner_email:user.email,contact_email:contactEmail,
        document_id:docId,access_level:"read",created_at:new Date().toISOString()
      });
      await logActivity(`You shared ${doc.name} with ${contactName}`,"document_access");
      loadDocs();
    }
    setDocs(p=>p.map(d=>d.id===docId?{...d,status:"shared"}:d));
    setShareDoc(null);
    showToast(`✅ Shared with ${contactName}`);
  };

  const handleSignOut=async()=>{
    if(supabase)await supabase.auth.signOut();
    setUser(null);setDocs([]);setContacts([]);setActivity([]);setTab("guide");
  };

  const handleOnboardingComplete=()=>{
    if(supabase&&user){
      supabase.from("profiles").upsert({email:user.email,preferred_name:user.name,onboarding_started:true},{onConflict:"email"});
    }
    setUser(p=>({...p,isNew:false}));
    setTab("home");
    showToast("🎉 Welcome to LyfeVest!");
  };

  if(!user) return <div style={{height:"100vh",overflowY:"auto"}}><Login onLogin={u=>{setUser(u);setTab(u.isNew?"guide":"home");}}/></div>;

  const NAV=[{id:"home",ico:"🏠",lbl:"Home"},{id:"guide",ico:null,lbl:"Relay"},{id:"vault",ico:"📂",lbl:"Vault"},{id:"circle",ico:"👥",lbl:"Circle"},{id:"activity",ico:"📋",lbl:"Activity"}];

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:T.sky,color:T.navy,overflow:"hidden",maxWidth:430,margin:"0 auto",fontFamily:"'DM Sans',system-ui,sans-serif"}}>

      <div style={{background:T.white,borderBottom:`1px solid ${T.g300}`,padding:"0 16px",height:56,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,boxShadow:"0 1px 4px rgba(26,43,74,.06)"}}>
        <Logo/>
        <div style={{display:"flex",gap:8}}>
          <div onClick={()=>showToast("No new notifications")} style={{width:33,height:33,borderRadius:"50%",background:T.sky,border:`1px solid ${T.g300}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,cursor:"pointer"}}>🔔</div>
          <div onClick={handleSignOut} title="Sign out" style={{width:33,height:33,borderRadius:"50%",background:T.navy,color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,border:`2px solid ${T.tealLt}`,cursor:"pointer"}}>{user.name.slice(0,2).toUpperCase()}</div>
        </div>
      </div>

      {/* Screens */}
      <div style={{flex:1,overflow:"hidden",position:"relative"}}>
        {tab==="home"&&<HomeScr docs={docs} contacts={contacts} onShare={id=>setShareDoc(docs.find(d=>d.id===id))} onNav={setTab} showToast={showToast} user={user} onUpload={()=>setUploadModal(true)}/>}
        {tab==="guide"&&<RelayScr showToast={showToast} onNav={setTab} user={user} onComplete={handleOnboardingComplete} isNew={user.isNew}/>}
        {tab==="vault"&&<VaultScr docs={docs} onShare={id=>setShareDoc(docs.find(d=>d.id===id))} showToast={showToast} onUpload={()=>setUploadModal(true)}/>}
        {tab==="circle"&&<CircleScr contacts={contacts} activity={activity} showToast={showToast} onAddContact={()=>setAddContactModal(true)}/>}
        {tab==="activity"&&<ActivityScr activity={activity}/>}
      </div>

      {/* Nav */}
      <div style={{background:T.white,borderTop:`1px solid ${T.g300}`,display:"flex",flexShrink:0,boxShadow:"0 -3px 12px rgba(26,43,74,.07)"}}>
        {NAV.map(it=>(
          <button key={it.id} onClick={()=>setTab(it.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,padding:"8px 4px 7px",border:"none",background:"none",cursor:"pointer"}}>
            <div style={{width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,transform:tab===it.id?"scale(1.12)":"scale(1)",transition:"transform .15s"}}>
              {it.ico?it.ico:<Mark size={22} color={tab===it.id?T.teal:T.g400}/>}
            </div>
            <div style={{fontSize:10,fontWeight:600,color:tab===it.id?T.teal:T.g400,letterSpacing:".02em"}}>{it.lbl}</div>
          </button>
        ))}
      </div>

      {/* Modals */}
      {shareDoc&&<ShareSheet doc={shareDoc} contacts={contacts} onClose={()=>setShareDoc(null)} onShare={doShare}/>}
      {uploadModal&&<UploadModal onClose={()=>setUploadModal(false)} onUpload={handleUpload} loading={loading}/>}
      {addContactModal&&<AddContactModal onClose={()=>setAddContactModal(false)} onAdd={handleAddContact} loading={loading}/>}

      {/* Toast */}
      <div style={{position:"fixed",bottom:72,left:"50%",transform:`translateX(-50%) translateY(${toast.show?0:14}px)`,opacity:toast.show?1:0,transition:"all .25s",background:T.navy,color:"white",borderRadius:11,padding:"11px 16px",display:"flex",alignItems:"center",gap:8,zIndex:999,pointerEvents:"none",whiteSpace:"nowrap",boxShadow:"0 12px 36px rgba(26,43,74,.22)"}}>
        <span style={{fontSize:13,fontWeight:500}}>{toast.msg}</span>
      </div>
    </div>
  );
}

// ── RELAY SCREEN ─────────────────────────────────────────────────────────────
function RelayScr({showToast,onNav,user,onComplete,isNew}){
  const[msgs,setMsgs]=useState([]);
  const[qr,setQr]=useState([]);
  const[busy,setBusy]=useState(false);
  const[step,setStep]=useState(1);
  const[input,setInput]=useState("");
  const[completed,setCompleted]=useState(!isNew);
  const hist=useRef([]),body=useRef(null),started=useRef(false);
  const pct=Math.round(((step-1)/6)*100);

  const scroll=()=>setTimeout(()=>body.current&&(body.current.scrollTop=99999),60);
  const addMsg=(role,text)=>{setMsgs(p=>[...p,{role,text,id:Date.now()+Math.random()}]);scroll();};

  const callAPI=useCallback(async(silent=false)=>{
    setBusy(true);setQr([]);
    const messages=silent?[{role:"user",content:"Begin. Introduce yourself as Relay in one sentence, then ask the user's first name."}]:hist.current;
    try{
      const r=await fetch("/.netlify/functions/relay",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:350,system:RELAY_SYS,messages})});
      if(!r.ok)throw new Error(`${r.status}`);
      const d=await r.json();
      const txt=d.content?.[0]?.text||"One moment…";
      hist.current.push({role:"assistant",content:txt});
      addMsg("ai",txt);
      const sm=txt.match(/Step (\d) complete/i);
      if(sm){const n=parseInt(sm[1]);setStep(s=>Math.min(n+1,6));}
      const lo=txt.toLowerCase();
      if(lo.includes("first name")||lo.includes("your name"))setQr(["Type my name →"]);
      else if(lo.includes("role")||lo.includes("caregiver"))setQr(["Caring for aging parent","Parent of young children","Both","Planning ahead"]);
      else if(lo.includes("family")||lo.includes("protecting"))setQr(["Aging parent","Young children","Spouse","All of the above"]);
      else if(lo.includes("document")||lo.includes("priority"))setQr(["Medical POA","Insurance card","Medication list","All of the above"]);
      else if(lo.includes("trust")||lo.includes("circle")||lo.includes("who should"))setQr(["Spouse/Partner","Adult sibling","My doctor","Multiple people"]);
      else if(lo.includes("access")||lo.includes("expir"))setQr(["Yes, enable expiry","Read-only is fine","No expiry needed"]);
      else if(lo.includes("all set")||lo.includes("vault is ready")||lo.includes("congratulations")){
        setStep(6);setCompleted(true);
        setQr(["🎉 Go to My Vault","👥 View My Circle"]);
        showToast("🎉 Setup complete!");
        onComplete&&onComplete();
      }
    }catch(e){
      addMsg("ai","I'm having trouble connecting right now. Please check that your Relay function is deployed and your API key is configured in Netlify.");
      setQr(["Try again"]);
    }finally{setBusy(false);}
  },[showToast,onComplete]);

  useEffect(()=>{
    if(!started.current){started.current=true;callAPI(true);}
  },[callAPI]);

  const send=txt=>{
    if(!txt.trim()||busy)return;
    addMsg("user",txt);
    hist.current.push({role:"user",content:txt});
    setInput("");
    if(txt==="Try again"){hist.current=[];callAPI(true);}
    else callAPI();
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:T.white}}>
      {/* Progress */}
      <div style={{background:T.sky,borderBottom:`1px solid ${T.g300}`,padding:"11px 16px 0",flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,fontWeight:600,color:T.textSoft,marginBottom:5}}>
          <span>Setup Progress</span>
          <span style={{color:T.teal,fontWeight:700}}>{pct}%</span>
        </div>
        <div style={{height:5,background:T.g300,borderRadius:3,marginBottom:9}}>
          <div style={{height:"100%",background:T.teal,borderRadius:3,width:`${pct}%`,transition:"width .5s ease"}}/>
        </div>
        <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:10,scrollbarWidth:"none"}}>
          {STEPS.map((nm,i)=>{const n=i+1,done=n<step,active=n===step;return(
            <div key={n} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",borderRadius:100,fontSize:11,fontWeight:600,whiteSpace:"nowrap",flexShrink:0,background:active?T.navy:done?T.tealLt:T.g100,color:active?"white":done?T.teal:T.g400,border:`1px solid ${active?T.navy:done?T.tealMid:T.g300}`}}>
              <div style={{width:14,height:14,borderRadius:"50%",background:active||done?T.teal:"rgba(0,0,0,.08)",color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:800}}>{done?"✓":n}</div>{nm}
            </div>);
          })}
        </div>
      </div>
      {/* Agent header */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",background:T.white,borderBottom:`1px solid ${T.g300}`,flexShrink:0}}>
        <div style={{width:37,height:37,borderRadius:"50%",background:`linear-gradient(135deg,${T.teal},${T.tealDk})`,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",flexShrink:0}}>
          <Mark size={21} color="white"/>
          <div style={{position:"absolute",bottom:1,right:1,width:9,height:9,background:T.green,borderRadius:"50%",border:"2px solid white"}}/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:T.navy}}>Relay — Your Setup Guide</div>
          <div style={{fontSize:11,color:T.g400}}>Powered by Claude AI · Confidential</div>
        </div>
        {busy&&<div style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:T.teal,fontWeight:600}}>{[0,.18,.36].map((d,i)=><span key={i} style={{width:4,height:4,background:T.teal,borderRadius:"50%",display:"inline-block",animation:`pulse 1.1s ease ${d}s infinite`}}/>)}<span style={{marginLeft:2}}>Thinking</span></div>}
      </div>
      {/* Messages */}
      <div ref={body} style={{flex:1,overflowY:"auto",padding:"13px 14px 8px",display:"flex",flexDirection:"column",gap:11}}>
        {msgs.map(m=>(
          <div key={m.id} className="fu" style={{display:"flex",gap:8,flexDirection:m.role==="user"?"row-reverse":"row"}}>
            <div style={{width:29,height:29,borderRadius:"50%",background:m.role==="ai"?`linear-gradient(135deg,${T.teal},${T.tealDk})`:T.navy,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:3}}>
              {m.role==="ai"?<Mark size={17} color="white"/>:<span style={{fontSize:10,fontWeight:700,color:"white"}}>{user?.name?.slice(0,2).toUpperCase()||"U"}</span>}
            </div>
            <div style={{padding:"10px 13px",borderRadius:14,fontSize:14,lineHeight:1.6,maxWidth:"calc(100% - 76px)",background:m.role==="ai"?T.sky:T.navy,color:m.role==="ai"?T.navy:"white",borderTopLeftRadius:m.role==="ai"?4:14,borderTopRightRadius:m.role==="user"?4:14,border:m.role==="ai"?`1px solid ${T.g300}`:"none"}}
              dangerouslySetInnerHTML={{__html:m.text.replace(/\*\*(.*?)\*\*/g,`<strong style="color:${T.teal}">$1</strong>`).replace(/\n/g,"<br/>")}}/>
          </div>
        ))}
        {busy&&<div style={{display:"flex",gap:8}}><div style={{width:29,height:29,borderRadius:"50%",background:`linear-gradient(135deg,${T.teal},${T.tealDk})`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Mark size={17} color="white"/></div><div style={{padding:"12px 15px",background:T.sky,border:`1px solid ${T.g300}`,borderRadius:14,borderTopLeftRadius:4,display:"flex",gap:3,alignItems:"center"}}>{[0,.18,.36].map((d,i)=><span key={i} style={{width:6,height:6,background:T.g300,borderRadius:"50%",display:"inline-block",animation:`pulse 1.1s ease ${d}s infinite`}}/>)}</div></div>}
      </div>
      {/* Quick replies */}
      {qr.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:7,padding:"0 14px 9px",flexShrink:0}}>
        {qr.map(o=><button key={o} onClick={()=>{
          setQr([]);
          const c=o.replace(/[🎉👥📂]/g,"").trim();
          if(o.includes("Vault"))setTimeout(()=>onNav("vault"),500);
          else if(o.includes("Circle"))setTimeout(()=>onNav("circle"),500);
          else if(o!=="Type my name →")send(c);
        }} style={{background:T.white,border:`1.5px solid ${T.teal}`,color:T.teal,borderRadius:100,padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{o}</button>)}
      </div>}
      {/* Input */}
      <div style={{padding:"9px 14px 11px",borderTop:`1px solid ${T.g300}`,background:T.white,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"flex-end",gap:8,background:T.sky,border:`1.5px solid ${T.g300}`,borderRadius:18,padding:"8px 11px"}}>
          <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);}}} onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,88)+"px";}} placeholder="Type your answer…" rows={1} style={{flex:1,background:"none",border:"none",color:T.navy,fontSize:14,lineHeight:1.5,minHeight:22,maxHeight:88,resize:"none"}}/>
          <button onClick={()=>send(input)} disabled={busy||!input.trim()} style={{width:30,height:30,borderRadius:"50%",background:busy||!input.trim()?T.g200:T.teal,color:busy||!input.trim()?T.g400:"white",border:"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,cursor:busy||!input.trim()?"not-allowed":"pointer",flexShrink:0}}>➤</button>
        </div>
      </div>
    </div>
  );
}

// ── CIRCLE SCREEN ─────────────────────────────────────────────────────────────
function CircleScr({contacts,activity,showToast,onAddContact}){
  return(
    <div style={{height:"100%",overflowY:"auto",background:T.sky,paddingBottom:16}}>
      <div style={{background:T.white,borderBottom:`1px solid ${T.g300}`,padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontFamily:"Nunito,sans-serif",fontSize:18,fontWeight:800,color:T.navy}}>My Trusted Circle</div>
        <button onClick={onAddContact} style={{background:T.teal,color:"white",border:"none",borderRadius:100,padding:"7px 15px",fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Add</button>
      </div>
      <div style={{padding:"14px 16px 0"}}>
        {contacts.length===0?(
          <div style={{background:T.white,borderRadius:18,border:`2px dashed ${T.g300}`,padding:"28px 18px",textAlign:"center",marginBottom:16}}>
            <div style={{fontSize:32,marginBottom:8}}>👥</div>
            <div style={{fontFamily:"Nunito,sans-serif",fontSize:15,fontWeight:800,color:T.navy,marginBottom:4}}>No contacts yet</div>
            <div style={{fontSize:12,color:T.g500,marginBottom:14}}>Add trusted people who can access your vault in emergencies</div>
            <button onClick={onAddContact} style={{background:T.teal,color:"white",border:"none",borderRadius:100,padding:"9px 20px",fontSize:13,fontWeight:700,cursor:"pointer"}}>+ Add First Contact</button>
          </div>
        ):contacts.map((c,i)=>(
          <div key={c.id} className="fu" style={{background:T.white,borderRadius:18,border:`1px solid ${T.g300}`,padding:14,marginBottom:9,animationDelay:`${i*45}ms`}}>
            <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:9}}>
              <div style={{width:44,height:44,borderRadius:"50%",background:c.color,color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,flexShrink:0}}>{c.initials}</div>
              <div><div style={{fontSize:14,fontWeight:700,color:T.navy}}>{c.name}</div><div style={{fontSize:12,color:T.g500,marginTop:1}}>{c.role}</div></div>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:11}}>
              {c.access.includes("write")?<Bdg l="✏️ R&amp;W" bg="rgba(0,180,200,.1)" c={T.teal}/>:<Bdg l="👁 Read" bg={T.g200} c={T.g500}/>}
              {c.access.includes("emergency")&&<Bdg l="🚨 Emergency" bg={T.greenLt} c={T.green}/>}
              <Bdg l={`⏱ ${c.exp}`} bg={T.amberLt} c={T.amber}/>
            </div>
            <div style={{display:"flex",gap:7,paddingTop:11,borderTop:`1px solid ${T.g300}`}}>
              <button onClick={()=>showToast(`✏️ Edit coming soon`)} style={{flex:1,padding:7,borderRadius:7,border:"none",fontSize:12,fontWeight:600,background:T.sky,color:T.navy,cursor:"pointer"}}>✏️ Edit</button>
              <button onClick={()=>showToast(`⚠️ Revoke ${c.name}?`)} style={{flex:1,padding:7,borderRadius:7,border:"none",fontSize:12,fontWeight:600,background:T.redLt,color:T.red,cursor:"pointer"}}>🚫 Revoke</button>
            </div>
          </div>
        ))}
        {activity.length>0&&(
          <>
            <div style={{fontFamily:"Nunito,sans-serif",fontSize:14,fontWeight:800,color:T.navy,marginBottom:9,marginTop:4}}>🔍 Audit Log</div>
            <div style={{background:T.white,borderRadius:18,border:`1px solid ${T.g300}`,overflow:"hidden"}}>
              {activity.slice(0,5).map((a,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",borderBottom:i<Math.min(activity.length,5)-1?`1px solid ${T.g300}`:"none"}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:a.type==="view"?T.tealLt:a.type==="share"?T.greenLt:T.blueLt,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0}}>{aIco(a.type)}</div>
                  <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600,color:T.navy}}>{a.action}</div><div style={{fontSize:11,color:T.g400,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.detail}</div></div>
                  <div style={{fontSize:10,color:T.g400,whiteSpace:"nowrap"}}>{a.time}</div>
                </div>
              ))}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── ACTIVITY SCREEN ───────────────────────────────────────────────────────────
function ActivityScr({activity}){
  return(
    <div style={{height:"100%",overflowY:"auto",background:T.sky,paddingBottom:16}}>
      <div style={{background:T.white,borderBottom:`1px solid ${T.g300}`,padding:"14px 16px"}}>
        <div style={{fontFamily:"Nunito,sans-serif",fontSize:18,fontWeight:800,color:T.navy}}>Activity Log</div>
        <div style={{fontSize:12,color:T.g500,marginTop:2}}>All access events logged for your security</div>
      </div>
      <div style={{padding:"14px 16px 0",display:"flex",flexDirection:"column",gap:8}}>
        {activity.length===0?(
          <div style={{textAlign:"center",padding:"32px 0",color:T.g500,fontSize:13}}>No activity yet. Actions will appear here as you use LyfeVest.</div>
        ):activity.map((a,i)=>(
          <div key={i} className="fu" style={{background:T.white,borderRadius:14,border:`1px solid ${T.g300}`,padding:"12px 14px",display:"flex",gap:10,alignItems:"flex-start",animationDelay:`${i*38}ms`}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:aClr(a.type),marginTop:4,flexShrink:0}}/>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:T.navy}}>{a.action}</div><div style={{fontSize:12,color:T.g500,marginTop:2}}>{a.detail}</div></div>
            <div style={{fontSize:11,color:T.g400,whiteSpace:"nowrap",flexShrink:0}}>{a.time}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── SHARE SHEET ───────────────────────────────────────────────────────────────
function ShareSheet({doc,contacts,onClose,onShare}){
  const[picked,setPicked]=useState(null);
  const[access,setAccess]=useState("read");
  const pickedContact=contacts.find(c=>c.id===picked);
  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(26,43,74,.45)",backdropFilter:"blur(3px)",zIndex:400,display:"flex",alignItems:"flex-end"}}>
      <div style={{background:T.white,borderRadius:"22px 22px 0 0",width:"100%",maxHeight:"90vh",overflowY:"auto",animation:"slideUp .28s ease"}}>
        <div style={{width:34,height:4,background:T.g300,borderRadius:2,margin:"11px auto 0"}}/>
        <div style={{padding:"13px 18px",borderBottom:`1px solid ${T.g300}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontFamily:"Nunito,sans-serif",fontSize:16,fontWeight:800,color:T.navy}}>Share Document</div><div style={{fontSize:12,color:T.g500,marginTop:1}}>Grant secure, audited access</div></div>
          <button onClick={onClose} style={{width:27,height:27,borderRadius:"50%",background:T.g100,border:"none",cursor:"pointer",fontSize:13,color:T.g500}}>✕</button>
        </div>
        <div style={{padding:"14px 18px",display:"flex",flexDirection:"column",gap:13}}>
          <div style={{background:T.sky,borderRadius:11,padding:"11px 13px",display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,borderRadius:9,background:doc.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>{doc.ico}</div>
            <div><div style={{fontSize:13,fontWeight:700,color:T.navy}}>{doc.name}</div><div style={{fontSize:11,color:T.g400,marginTop:1}}>Encrypted · Audit logged</div></div>
          </div>
          {contacts.length===0?(
            <div style={{textAlign:"center",padding:"16px",color:T.g500,fontSize:13,background:T.sky,borderRadius:11}}>Add trusted contacts first to share documents.</div>
          ):(
            <div>
              <div style={{fontSize:11,fontWeight:700,color:T.navy,letterSpacing:".05em",textTransform:"uppercase",marginBottom:7}}>Select Contact</div>
              {contacts.map(c=>(
                <div key={c.id} onClick={()=>setPicked(c.id)} style={{display:"flex",alignItems:"center",gap:9,padding:"10px 13px",borderRadius:11,border:`1.5px solid ${picked===c.id?T.teal:"transparent"}`,background:picked===c.id?T.tealLt:T.sky,cursor:"pointer",marginBottom:6}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:c.color,color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0}}>{c.initials}</div>
                  <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:T.navy}}>{c.name}</div><div style={{fontSize:11,color:T.g500}}>{c.role}</div></div>
                  <div style={{width:19,height:19,borderRadius:"50%",border:`2px solid ${picked===c.id?T.teal:T.g300}`,background:picked===c.id?T.teal:"white",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:10}}>{picked===c.id?"✓":""}</div>
                </div>
              ))}
            </div>
          )}
          <div>
            <div style={{fontSize:11,fontWeight:700,color:T.navy,letterSpacing:".05em",textTransform:"uppercase",marginBottom:7}}>Access Level</div>
            <div style={{display:"flex",gap:7}}>
              {[{id:"read",l:"👁 Read Only",d:"View only"},{id:"write",l:"✏️ Read & Write",d:"Can edit"}].map(a=>(
                <div key={a.id} onClick={()=>setAccess(a.id)} style={{flex:1,padding:"10px 7px",borderRadius:11,border:`1.5px solid ${access===a.id?T.teal:T.g300}`,background:access===a.id?T.tealLt:T.white,cursor:"pointer",textAlign:"center"}}>
                  <div style={{fontSize:12,fontWeight:700,color:access===a.id?T.teal:T.navy,marginBottom:2}}>{a.l}</div>
                  <div style={{fontSize:10,color:T.g500}}>{a.d}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{background:T.sky,borderRadius:11,padding:"10px 12px",display:"flex",gap:8}}>
            <span style={{color:T.teal,flexShrink:0}}>🔒</span>
            <div style={{fontSize:11,color:T.g500,lineHeight:1.5}}>Logged in your audit trail with timestamp, contact, and access level. Revoke anytime from Circle.</div>
          </div>
        </div>
        <div style={{display:"flex",gap:9,padding:"0 18px 22px"}}>
          <button onClick={onClose} style={{flex:1,padding:11,borderRadius:13,background:T.g200,color:T.g500,border:"none",fontSize:14,fontWeight:600,cursor:"pointer"}}>Cancel</button>
          <button onClick={()=>{if(!picked){alert("Select a contact first");return;}onShare(doc.id,pickedContact.name,pickedContact.email);}} disabled={!picked||contacts.length===0} style={{flex:2,padding:11,borderRadius:13,background:picked?T.teal:T.g300,color:"white",border:"none",fontSize:14,fontWeight:700,cursor:picked?"pointer":"not-allowed"}}>🔗 Share Document</button>
        </div>
      </div>
    </div>
  );
}

// ── UPLOAD MODAL ──────────────────────────────────────────────────────────────
function UploadModal({onClose,onUpload,loading}){
  const[file,setFile]=useState(null);
  const[name,setName]=useState("");
  const[type,setType]=useState("Medical");
  const[sensitive,setSensitive]=useState(false);
  const fileRef=useRef(null);
  const DOC_TYPES=["Medical","Legal","Insurance","Identity","Financial","Other"];
  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(26,43,74,.45)",backdropFilter:"blur(3px)",zIndex:400,display:"flex",alignItems:"flex-end"}}>
      <div style={{background:T.white,borderRadius:"22px 22px 0 0",width:"100%",maxHeight:"90vh",overflowY:"auto",animation:"slideUp .28s ease"}}>
        <div style={{width:34,height:4,background:T.g300,borderRadius:2,margin:"11px auto 0"}}/>
        <div style={{padding:"13px 18px",borderBottom:`1px solid ${T.g300}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontFamily:"Nunito,sans-serif",fontSize:16,fontWeight:800,color:T.navy}}>Upload Document</div><div style={{fontSize:12,color:T.g500,marginTop:1}}>Stored securely with encryption</div></div>
          <button onClick={onClose} style={{width:27,height:27,borderRadius:"50%",background:T.g100,border:"none",cursor:"pointer",fontSize:13,color:T.g500}}>✕</button>
        </div>
        <div style={{padding:"16px 18px",display:"flex",flexDirection:"column",gap:13}}>
          <div onClick={()=>fileRef.current?.click()} style={{border:`2px dashed ${file?T.teal:T.g300}`,borderRadius:14,padding:"20px",textAlign:"center",background:file?T.tealLt:T.sky,cursor:"pointer"}}>
            <input ref={fileRef} type="file" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" onChange={e=>{const f=e.target.files[0];if(f){setFile(f);if(!name)setName(f.name.replace(/\.[^.]+$/,""));}}} style={{display:"none"}}/>
            <div style={{fontSize:24,marginBottom:6}}>{file?"✅":"📎"}</div>
            <div style={{fontSize:13,fontWeight:600,color:file?T.teal:T.g500}}>{file?file.name:"Tap to select file"}</div>
            <div style={{fontSize:11,color:T.g400,marginTop:2}}>PDF, JPG, PNG, DOC</div>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:T.navy,marginBottom:6,letterSpacing:".05em",textTransform:"uppercase"}}>Document Name</div>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Medical Power of Attorney" style={{width:"100%",padding:"11px 13px",borderRadius:11,border:`1.5px solid ${T.g300}`,fontSize:14,color:T.navy,background:T.sky,boxSizing:"border-box"}}/>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:T.navy,marginBottom:6,letterSpacing:".05em",textTransform:"uppercase"}}>Document Type</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
              {DOC_TYPES.map(t=>(
                <button key={t} onClick={()=>setType(t)} style={{padding:"6px 13px",borderRadius:100,fontSize:12,fontWeight:600,background:type===t?T.teal:T.g100,color:type===t?"white":T.g500,border:`1.5px solid ${type===t?T.teal:T.g300}`,cursor:"pointer"}}>{t}</button>
              ))}
            </div>
          </div>
          <div onClick={()=>setSensitive(!sensitive)} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 13px",background:T.sky,borderRadius:11,cursor:"pointer",border:`1.5px solid ${sensitive?T.amber:T.g300}`}}>
            <div style={{width:20,height:20,borderRadius:5,background:sensitive?T.amber:T.g200,border:`2px solid ${sensitive?T.amber:T.g300}`,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:12,flexShrink:0}}>{sensitive?"✓":""}</div>
            <div><div style={{fontSize:13,fontWeight:600,color:T.navy}}>Mark as Sensitive</div><div style={{fontSize:11,color:T.g500}}>Requires extra confirmation to view</div></div>
          </div>
        </div>
        <div style={{display:"flex",gap:9,padding:"0 18px 22px"}}>
          <button onClick={onClose} style={{flex:1,padding:11,borderRadius:13,background:T.g200,color:T.g500,border:"none",fontSize:14,fontWeight:600,cursor:"pointer"}}>Cancel</button>
          <button onClick={()=>{if(!file||!name){alert("Please select a file and enter a name.");return;}onUpload(file,{name,type,sensitive});}} disabled={loading||!file||!name} style={{flex:2,padding:11,borderRadius:13,background:file&&name?T.teal:T.g300,color:"white",border:"none",fontSize:14,fontWeight:700,cursor:file&&name?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {loading?<><Spinner/> Uploading…</>:"📤 Upload Securely"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── ADD CONTACT MODAL ─────────────────────────────────────────────────────────
function AddContactModal({onClose,onAdd,loading}){
  const[name,setName]=useState("");
  const[email,setEmail]=useState("");
  const[relationship,setRelationship]=useState("Family");
  const[access,setAccess]=useState("read");
  const RELS=["Family","Spouse","Parent","Sibling","Child","Physician","Attorney","Friend","Other"];
  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(26,43,74,.45)",backdropFilter:"blur(3px)",zIndex:400,display:"flex",alignItems:"flex-end"}}>
      <div style={{background:T.white,borderRadius:"22px 22px 0 0",width:"100%",maxHeight:"90vh",overflowY:"auto",animation:"slideUp .28s ease"}}>
        <div style={{width:34,height:4,background:T.g300,borderRadius:2,margin:"11px auto 0"}}/>
        <div style={{padding:"13px 18px",borderBottom:`1px solid ${T.g300}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontFamily:"Nunito,sans-serif",fontSize:16,fontWeight:800,color:T.navy}}>Add Trusted Contact</div><div style={{fontSize:12,color:T.g500,marginTop:1}}>Grant emergency access to someone you trust</div></div>
          <button onClick={onClose} style={{width:27,height:27,borderRadius:"50%",background:T.g100,border:"none",cursor:"pointer",fontSize:13,color:T.g500}}>✕</button>
        </div>
        <div style={{padding:"16px 18px",display:"flex",flexDirection:"column",gap:13}}>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:T.navy,marginBottom:6,letterSpacing:".05em",textTransform:"uppercase"}}>Full Name</div>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Diane Jones" style={{width:"100%",padding:"11px 13px",borderRadius:11,border:`1.5px solid ${T.g300}`,fontSize:14,color:T.navy,background:T.sky,boxSizing:"border-box"}}/>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:T.navy,marginBottom:6,letterSpacing:".05em",textTransform:"uppercase"}}>Email Address</div>
            <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="e.g. diane@email.com" style={{width:"100%",padding:"11px 13px",borderRadius:11,border:`1.5px solid ${T.g300}`,fontSize:14,color:T.navy,background:T.sky,boxSizing:"border-box"}}/>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:T.navy,marginBottom:6,letterSpacing:".05em",textTransform:"uppercase"}}>Relationship</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
              {RELS.map(r=>(
                <button key={r} onClick={()=>setRelationship(r)} style={{padding:"6px 13px",borderRadius:100,fontSize:12,fontWeight:600,background:relationship===r?T.teal:T.g100,color:relationship===r?"white":T.g500,border:`1.5px solid ${relationship===r?T.teal:T.g300}`,cursor:"pointer"}}>{r}</button>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:T.navy,marginBottom:6,letterSpacing:".05em",textTransform:"uppercase"}}>Access Level</div>
            <div style={{display:"flex",gap:7}}>
              {[{id:"read",l:"👁 Read Only",d:"View documents"},{id:"write",l:"✏️ Read & Write",d:"Edit & upload"}].map(a=>(
                <div key={a.id} onClick={()=>setAccess(a.id)} style={{flex:1,padding:"10px 7px",borderRadius:11,border:`1.5px solid ${access===a.id?T.teal:T.g300}`,background:access===a.id?T.tealLt:T.white,cursor:"pointer",textAlign:"center"}}>
                  <div style={{fontSize:12,fontWeight:700,color:access===a.id?T.teal:T.navy,marginBottom:2}}>{a.l}</div>
                  <div style={{fontSize:10,color:T.g500}}>{a.d}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:9,padding:"0 18px 22px"}}>
          <button onClick={onClose} style={{flex:1,padding:11,borderRadius:13,background:T.g200,color:T.g500,border:"none",fontSize:14,fontWeight:600,cursor:"pointer"}}>Cancel</button>
          <button onClick={()=>{if(!name||!email){alert("Please enter name and email.");return;}onAdd({name,email,relationship,access});}} disabled={loading||!name||!email} style={{flex:2,padding:11,borderRadius:13,background:name&&email?T.teal:T.g300,color:"white",border:"none",fontSize:14,fontWeight:700,cursor:name&&email?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {loading?<><Spinner/> Adding…</>:"👥 Add to Circle"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── UTILITY FUNCTIONS ─────────────────────────────────────────────────────────
function catIco(type){return{Medical:"💊",Legal:"⚖️",Insurance:"🛡️",Identity:"🪪",Financial:"💰"}[type]||"📋";}
function catBg(type){return{Medical:"#FFF0F0",Legal:"#EBF3FF",Insurance:"#E8FFF6",Identity:"#FEF3DC",Financial:"#F0F4F8"}[type]||"#F8FAFC";}

function DocRow({doc,onClick,delay=0}){
  const c=chip(doc.status);
  return(
    <div className="fu" onClick={onClick} style={{background:T.white,borderRadius:14,padding:"12px 14px",display:"flex",alignItems:"center",gap:10,border:`1px solid ${T.g300}`,cursor:"pointer",animationDelay:`${delay}ms`}}>
      <div style={{width:36,height:36,borderRadius:10,background:doc.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{doc.ico}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13,fontWeight:600,color:T.navy,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{doc.name}</div>
        <div style={{fontSize:11,color:T.g400,marginTop:1}}>{doc.cat[0]?.toUpperCase()+doc.cat?.slice(1)} · {doc.updated}</div>
      </div>
      <Chip s={doc.status}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
